name: docs

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'tools/docs/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - '.github/workflows/docs.yml'
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'tools/docs/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - '.github/workflows/docs.yml'

jobs:
  build-docs:
    runs-on: windows-latest
    env:
      NO_MKDOCS_2_WARNING: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13.7'
      - name: Install project
        run: python -m pip install --upgrade pip; python -m pip install -e .
      - name: Install docs dependencies
        run: python -m pip install -r requirements-docs.txt
      - name: Show docs environment
        run: python --version; pip --version; python -m pip show typer click rich shellingham
      - name: Generate docs
        run: python tools/docs/gen_cli_ref.py; python tools/docs/gen_schema_ref.py; python tools/docs/gen_artifact_catalog.py
      - name: Show CLI docs diff
        if: always()
        run: git diff -- docs/reference/cli/canon.md; git diff -- docs/reference/cli/overview.md; git diff -- docs/reference/cli/risk.md; git diff -- docs/reference/cli/risk_run.md; git diff -- docs/reference/cli/risk_runset.md
      - name: Verify generated docs
        run: python tools/docs/verify_generated_docs_clean.py
      - name: Build docs site
        run: python -m mkdocs build
