stages:
  - stage: baseline
    name: Baseline
    tools:
      - cli: python -m research_core.cli risk sweep --catalog exec_outputs/catalog --runset RUNSET_ID --out exec_outputs/pilot/risk
      - cli: python -m research_core.cli baseline index refresh --root baselines/prod
      - cli: python -m research_core.cli baseline promote --root baselines/prod --runset RUNSET_ID --baseline-id BASELINE_ID --label prod
      - cli: python -m research_core.cli risk diff --a <baseline.card.json> --b <baseline.card.json> --out <dir>
    outputs:
      - id: baseline.card.json
        path_template: baselines/prod/<runset_id>/baseline.card.json
        type: json
        schema: "TODO: schema link not yet confirmed"
        description: Baseline card produced by baseline promotion workflow.
        invariants:
          - File exists after promote_es5m_baseline workflow completes.
        verification:
          - Check baselines/prod/<runset_id>/baseline.card.json exists.
      - id: baseline.diff.json
        path_template: <out>/baseline.diff.json
        type: json
        schema: "TODO: schema link not yet confirmed"
        description: Deterministic baseline diff output from risk diff.
        invariants:
          - Baseline diff classification uses fixed v1 instability thresholds.
        verification:
          - Check <out>/baseline.diff.json exists after risk diff.
      - id: baseline.diff.manifest.json
        path_template: <out>/baseline.diff.manifest.json
        type: json
        schema: "TODO: schema link not yet confirmed"
        description: Manifest for baseline.diff.json with input and output hashes.
        invariants:
          - Manifest includes byte hashes for both baseline card inputs and diff output.
        verification:
          - Check <out>/baseline.diff.manifest.json exists after risk diff.

  - stage: drift
    name: Drift
    tools:
      - cli: python -m research_core.cli risk drift --catalog exec_outputs/catalog --root baselines/prod --runset RUNSET_ID --label prod --out exec_outputs/pilot/drift
      - cli: python -m research_core.cli risk dashboard --catalog exec_outputs/catalog --root baselines/prod --runsets configs/pilot/runsets.pilot.json --out exec_outputs/pilot/dashboard --label prod
    outputs:
      - id: dashboard.summary.json
        path_template: <out>/dashboard.summary.json
        type: json
        schema: ../schemas/dashboard.summary.schema.v1.md
        description: Deterministic dashboard summary generated from runset drift reports.
        invariants:
          - Dashboard summary is written only when all listed runsets succeed.
        verification:
          - Check <out>/dashboard.summary.json exists after risk dashboard.
      - id: dashboard.summary.manifest.json
        path_template: <out>/dashboard.summary.manifest.json
        type: json
        schema: "TODO: schema link not yet confirmed"
        description: Manifest for dashboard summary with runsets and drift report inputs.
        invariants:
          - Manifest includes sorted input hashes and dashboard output hash.
        verification:
          - Check <out>/dashboard.summary.manifest.json exists after risk dashboard.
      - id: drift.report.json
        path_template: <out>/drift/<runset_id>/drift.report.json
        type: json
        schema: ../schemas/drift.report.schema.v1.md
        description: Deterministic drift classification report for one runset.
        invariants:
          - Drift status is DRIFT iff abs(instability_mean_delta) >= 5.0 or worst5_jaccard <= 0.40.
        verification:
          - Check <out>/drift/<runset_id>/drift.report.json exists after risk dashboard.
      - id: drift.report.manifest.json
        path_template: <out>/drift/<runset_id>/drift.report.manifest.json
        type: json
        schema: "TODO: schema link not yet confirmed"
        description: Manifest for drift report with baseline, runset, and diff inputs.
        invariants:
          - Manifest includes drift report output hash and sorted input hashes.
        verification:
          - Check <out>/drift/<runset_id>/drift.report.manifest.json exists after risk dashboard.

  - stage: lineage
    name: Lineage
    tools:
      - cli: research registry build
      - cli: research registry index-runs
    outputs:
      - id: registry.json
        path_template: exec_outputs/registry/registry.json
        type: json
        schema: ../schemas/registry.schema.v1.md
        description: Registry snapshot from registry build command.
        invariants:
          - Registry build command writes a JSON file at the configured --out path.
        verification:
          - Check exec_outputs/registry/registry.json exists.
      - id: index.json
        path_template: exec_outputs/runs/index.json
        type: json
        schema: "TODO: schema link not yet confirmed"
        description: Runs index generated by registry index-runs command.
        invariants:
          - Index-runs command writes a JSON index at configured --out path.
        verification:
          - Check exec_outputs/runs/index.json exists.

  - stage: risk
    name: Risk
    tools:
      - cli: research risk runset
    outputs:
      - id: risk.runset.manifest.json
        path_template: <out>/<runset_id>/risk.runset.manifest.json
        type: json
        schema: "TODO: schema link not yet confirmed"
        description: Manifest for runset risk summary including runset and per-run inputs.
        invariants:
          - Manifest includes runset risk summary output hash and deterministic input list.
        verification:
          - Check <out>/<runset_id>/risk.runset.manifest.json exists.
      - id: risk.runset.summary.json
        path_template: <out>/<runset_id>/risk.runset.summary.json
        type: json
        schema: "TODO: schema link not yet confirmed"
        description: Deterministic runset-level risk summary from risk runset.
        invariants:
          - File exists for each analyzed runset_id.
        verification:
          - Check <out>/<runset_id>/risk.runset.summary.json exists.

  - stage: stage0_canon
    name: Stage 0 Canon
    tools:
      - cli: research canon
      - cli: research validate canon
    outputs:
      - id: canon.manifest.json
        path_template: <run_dir>/canon.manifest.json
        type: json
        schema: "TODO: schema link not yet confirmed"
        description: Canon generation manifest required by phase0 gates.
        invariants:
          - Canonicalization gate requires canon.manifest.json to exist per run.
        verification:
          - Check <run_dir>/canon.manifest.json exists.
      - id: canon.contract.json
        path_template: exec_outputs/runs/sample/canon.contract.json
        type: json
        schema: "TODO: schema link not yet confirmed"
        description: Canon contract output path from validate canon command.
        invariants:
          - Contract path matches validate canon --contract target.
        verification:
          - Check exec_outputs/runs/sample/canon.contract.json exists.
      - id: canon.parquet
        path_template: exec_outputs/runs/sample/canon.parquet
        type: parquet
        schema: ../schemas/canon.schema.v1.md
        description: Canonicalized dataset output from canon command.
        invariants:
          - Required canon columns follow the canonical ordering contract.
          - Timestamps are monotonic and duplicate timestamps are forbidden.
        verification:
          - Check exec_outputs/runs/sample/canon.parquet exists.
      - id: canon_validate.json
        path_template: <run_dir>/validate/canon_validate.json
        type: json
        schema: "TODO: schema link not yet confirmed"
        description: Validate canon report required by phase0 gates.
        invariants:
          - Validate gate requires validate/canon_validate.json to exist.
        verification:
          - Check <run_dir>/validate/canon_validate.json exists.
      - id: canon.log
        path_template: <run_dir>/logs/canon.log
        type: "TODO: confirm type"
        schema: "TODO: not schema-driven"
        description: Canonicalization log file required by phase0 gates.
        invariants:
          - Canon gate requires logs/canon.log to exist per run.
        verification:
          - Check <run_dir>/logs/canon.log exists.

  - stage: stage1_diagnostics
    name: Stage 1 Diagnostics
    tools:
      - cli: research ci doctor
    outputs:
      - id: ci.doctor.summary.json
        path_template: exec_outputs/analysis/es_5m/doctor/ci.doctor.summary.json
        type: json
        schema: ../schemas/ci.doctor.summary.schema.v1.md
        description: CI doctor summary listed as a primary ES5M analysis output.
        invariants:
          - File exists after ci doctor completes in the ES5M flow.
        verification:
          - Check exec_outputs/analysis/es_5m/doctor/ci.doctor.summary.json exists.

