stages:
  - stage: baseline
    name: Baseline
    tools:
      - cli: "TODO: confirm exact baseline CLI invocation from canonical user docs"
    outputs:
      - id: baseline.card.json
        path_template: baselines/prod/<runset_id>/baseline.card.json
        type: json
        schema: "TODO: schema link not yet confirmed"
        description: Baseline card produced by baseline promotion workflow.
        invariants:
          - File exists after promote_es5m_baseline workflow completes.
        verification:
          - Check baselines/prod/<runset_id>/baseline.card.json exists.
    todos:
      - "TODO: confirm baseline diff/index/promotions artifact paths from contract sources."

  - stage: drift
    name: Drift
    tools:
      - cli: "TODO: confirm drift CLI command entrypoints"
    outputs:
      - id: dashboard.summary.json
        path_template: exec_outputs/analysis/es_5m/dashboard/dashboard.summary.json
        type: json
        schema: ../schemas/dashboard.summary.schema.v1.md
        description: Dashboard summary listed as primary ES5M analysis output.
        invariants:
          - File exists when dashboard verification reports success.
        verification:
          - Run docs/scripts/verify_es5m_dashboard.ps1 and confirm DASHBOARD OK.
    todos:
      - "TODO: confirm dedicated drift.report output path for this workflow."

  - stage: lineage
    name: Lineage
    tools:
      - cli: research registry build
      - cli: research registry index-runs
    outputs:
      - id: registry.json
        path_template: exec_outputs/registry/registry.json
        type: json
        schema: ../schemas/registry.schema.v1.md
        description: Registry snapshot from registry build command.
        invariants:
          - Registry build command writes a JSON file at the configured --out path.
        verification:
          - Check exec_outputs/registry/registry.json exists.
      - id: index.json
        path_template: exec_outputs/runs/index.json
        type: json
        schema: "TODO: schema link not yet confirmed"
        description: Runs index generated by registry index-runs command.
        invariants:
          - Index-runs command writes a JSON index at configured --out path.
        verification:
          - Check exec_outputs/runs/index.json exists.

  - stage: risk
    name: Risk
    tools:
      - cli: research risk runset
    outputs:
      - id: risk.runset.summary.json
        path_template: exec_outputs/analysis/es_5m/risk_runset/<runset_id>/risk.runset.summary.json
        type: json
        schema: "TODO: schema link not yet confirmed"
        description: Runset risk summary output listed in ES5M analysis docs.
        invariants:
          - File exists for each analyzed runset_id.
        verification:
          - Check exec_outputs/analysis/es_5m/risk_runset/<runset_id>/risk.runset.summary.json exists.

  - stage: stage0_canon
    name: Stage 0 Canon
    tools:
      - cli: research canon
      - cli: research validate canon
    outputs:
      - id: canon.contract.json
        path_template: exec_outputs/runs/sample/canon.contract.json
        type: json
        schema: "TODO: schema link not yet confirmed"
        description: Canon contract output path from validate canon command.
        invariants:
          - Contract path matches validate canon --contract target.
        verification:
          - Check exec_outputs/runs/sample/canon.contract.json exists.
      - id: canon.parquet
        path_template: exec_outputs/runs/sample/canon.parquet
        type: parquet
        schema: ../schemas/canon.schema.v1.md
        description: Canonicalized dataset output from canon command.
        invariants:
          - Required canon columns follow the canonical ordering contract.
          - Timestamps are monotonic and duplicate timestamps are forbidden.
        verification:
          - Check exec_outputs/runs/sample/canon.parquet exists.

  - stage: stage1_diagnostics
    name: Stage 1 Diagnostics
    tools:
      - cli: research ci doctor
    outputs:
      - id: ci.doctor.summary.json
        path_template: exec_outputs/analysis/es_5m/doctor/ci.doctor.summary.json
        type: json
        schema: ../schemas/ci.doctor.summary.schema.v1.md
        description: CI doctor summary listed as a primary ES5M analysis output.
        invariants:
          - File exists after ci doctor completes in the ES5M flow.
        verification:
          - Check exec_outputs/analysis/es_5m/doctor/ci.doctor.summary.json exists.

